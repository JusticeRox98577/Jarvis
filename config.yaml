# J.A.R.V.I.S. configuration
# Edit this file, then restart the app for changes to take effect.

ollama:
  host: "http://localhost:11434"
  # Set to whatever you have pulled -- check with `ollama list`.
  # huihui_ai/mistral-small-abliterated:24b (~14GB, Q4_K_M) is a strong,
  # well-regarded uncensored general-purpose model that still leaves ~6GB
  # of headroom on a 20GB card. Pull it with:
  #   ollama pull huihui_ai/mistral-small-abliterated:24b
  # Swap back to qwen2.5-coder:7b (~5GB, more headroom) for coding-heavy
  # sessions, or avoid anything near ~19GB+ (like glm-4.7-flash) -- it
  # leaves almost no VRAM room and maxes the card out instantly.
  model: "huihui_ai/mistral-small-abliterated:24b"
  system_prompt: >
    You are J.A.R.V.I.S., Tony Stark's AI assistant. You are witty, extremely
    competent, concise, and unflappable. Address the user as "sir" or "boss"
    occasionally, but do not overdo it. Prefer short, direct answers unless
    the user asks for detail. You have a dry sense of humor.
  temperature: 0.7

voice:
  enabled: true
  stt_model: "base"      # tiny | base | small | medium (bigger = more accurate, slower)
  stt_device: "cpu"      # your 7900X handles "base"/"small" easily
  tts_enabled: true
  tts_rate: 178
  tts_voice_hint: "male" # tries to auto-pick a deeper Windows SAPI5 voice

memory:
  # Long-term recall across sessions: past exchanges and anything you tell
  # Jarvis to remember get embedded locally and retrieved when relevant.
  # Only stores what's said IN CHAT -- never anything from outside the app.
  enabled: true
  embed_model: "nomic-embed-text" # run: ollama pull nomic-embed-text
  top_k: 4

personality:
  # Jarvis nudges its tone based on explicit feedback you give it in chat
  # (e.g. "be more concise", "loosen up", "be more formal"). Values are
  # 0.0-1.0 and persist in data/personality.json between runs.
  adapt: true
  verbosity: 0.5   # 0 = terse, 1 = thorough
  formality: 0.4   # 0 = casual, 1 = formal
  humor: 0.4       # 0 = serious, 1 = playful

awareness:
  # OFF by default, and double-gated: this flag AND the in-app "AWARE"
  # button must both be on. When active, Jarvis only ever reads the TITLE
  # of your current foreground window (e.g. "Notepad - todo.txt") for
  # conversational context -- never keystrokes, never screen content,
  # never clipboard. Nothing here is written to disk; only the single
  # most recent title is held in memory for the running session.
  # Anything matching the blocklist below is skipped entirely.
  enabled: false
  poll_seconds: 5
  blocklist:
    - "keepass"
    - "bitwarden"
    - "1password"
    - "lastpass"
    - "dashlane"
    - "bank"
    - "chase"
    - "paypal"
    - "venmo"
    - "incognito"
    - "private browsing"

app:
  name: "J.A.R.V.I.S."
  data_dir: "data"
  max_history_turns: 20
